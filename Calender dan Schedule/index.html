<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar with Events</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
:root {
  --primary: #4a6bdf;
  --secondary: #6c5ce7;
  --accent: #00cec9;
  --light: #f8f9fa;
  --dark: #2d3436;
  --text: #636e72;
  --today: #fd79a8;
  --selected: #a29bfe;
  --event-panel-bg: #f8f9fa;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: linear-gradient(135deg, #f5f7fa 0%, #dfe6e9 100%);
  padding: 20px;
}

.container {
  display: flex;
  flex-direction: column;
  gap: 20px;
  max-width: 900px;
  width: 100%;
}

@media (min-width: 768px) {
  .container {
    flex-direction: row;
    align-items: flex-start;
  }
}

.calendar-container {
  background: white;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
  width: 100%;
  max-width: 400px;
  overflow: hidden;
  transform-style: preserve-3d;
  perspective: 1000px;
  transition: all 0.3s ease;
}

.calendar-container:hover {
  transform: translateY(-5px);
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
}

.calendar-header {
  background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
  color: white;
  padding: 1.5rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.calendar-header::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 70%);
  transform: rotate(30deg);
}

.month-year {
  font-size: 1.5rem;
  font-weight: 600;
  margin-bottom: 0.5rem;
  position: relative;
}

.nav-buttons {
  display: flex;
  justify-content: space-between;
  position: absolute;
  width: 100%;
  top: 50%;
  left: 0;
  transform: translateY(-50%);
  padding: 0 1rem;
  z-index: 1;
}

.nav-btn {
  background: rgba(255, 255, 255, 0.2);
  color: white;
  border: none;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}

.nav-btn:hover {
  background: rgba(255, 255, 255, 0.3);
  transform: scale(1.1);
}

.weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding: 0.5rem 1rem;
  background: rgba(74, 107, 223, 0.1);
  font-weight: 600;
  color: var(--primary);
}

.weekday {
  text-align: center;
  padding: 0.5rem;
  font-size: 0.9rem;
}

.days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
  padding: 1rem;
}

.day {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  font-weight: 500;
  color: var(--dark);
}

.day:hover {
  background: rgba(74, 107, 223, 0.1);
  transform: scale(1.1);
}

.day.today {
  background: var(--today);
  color: white;
  font-weight: bold;
}

.day.selected {
  background: var(--selected);
  color: white;
  font-weight: bold;
  animation: pop 0.3s ease;
}

@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

.day.other-month {
  color: var(--text);
  opacity: 0.5;
}

.day.has-events::after {
  content: '';
  position: absolute;
  bottom: 5px;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent);
}

.calendar-footer {
  padding: 1rem;
  text-align: center;
  border-top: 1px solid rgba(0, 0, 0, 0.1);
  display: flex;
  justify-content: space-between;
}

.today-btn {
  background: linear-gradient(135deg, var(--accent) 0%, #00b894 100%);
  color: white;
  border: none;
  padding: 0.5rem 1rem;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s ease;
  font-weight: 500;
}

.today-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(0, 206, 201, 0.3);
}

.event-indicator {
  font-size: 0.8rem;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 5px;
}

.event-panel {
  background: white;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
  padding: 1.5rem;
  width: 100%;
  max-width: 450px;
  height: fit-content;
}

.event-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.5rem;
  padding-bottom: 1rem;
  border-bottom: 2px solid rgba(74, 107, 223, 0.2);
}

.event-date {
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--primary);
}

.event-list {
  max-height: 350px;
  overflow-y: auto;
}

.event-item {
  padding: 1rem;
  margin-bottom: 0.8rem;
  background: var(--event-panel-bg);
  border-radius: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
  transition: transform 0.2s ease;
}

.event-item:hover {
  transform: translateX(5px);
}

.event-color {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
}

.event-time {
  font-weight: 600;
  color: var(--primary);
  min-width: 80px;
}

.event-text {
  flex: 1;
}

.no-events {
  text-align: center;
  color: var(--text);
  padding: 2rem 1rem;
  font-style: italic;
}

.event-icon {
  font-size: 1.2rem;
  color: var(--accent);
  margin-right: 10px;
}

@media (max-width: 767px) {
  .container {
    gap: 15px;
  }

  .calendar-container, .event-panel {
    width: 100%;
    margin: 0 auto;
  }

  .event-panel {
    max-width: 400px;
  }

  .event-date {
    font-size: 1.3rem;
  }
}

.add-event-form {
  background: linear-gradient(135deg, rgba(74,107,223,0.06) 0%, rgba(108,92,231,0.06) 100%);
  border: 1.5px solid rgba(74,107,223,0.18);
  border-radius: 14px;
  padding: 1.1rem 1.2rem 1rem;
  margin-bottom: 1.1rem;
  animation: slideDown 0.22s ease;
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.form-title {
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.85rem;
  font-size: 0.97rem;
  display: flex;
  align-items: center;
  gap: 7px;
}

.form-group {
  margin-bottom: 0.7rem;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.form-group label {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 5px;
}

.form-group input[type="text"],
.form-group input[type="time"] {
  border: 1.5px solid rgba(74,107,223,0.25);
  border-radius: 8px;
  padding: 0.45rem 0.75rem;
  font-size: 0.92rem;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  font-family: inherit;
  color: var(--dark);
  background: white;
  width: 100%;
}

.form-group input[type="text"]:focus,
.form-group input[type="time"]:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(74,107,223,0.12);
}

.form-group input.input-error {
  border-color: #e17055;
  box-shadow: 0 0 0 3px rgba(225,112,85,0.15);
}

.form-group input[type="time"]:disabled {
  background: #f0f0f0;
  color: #aaa;
  cursor: not-allowed;
}

.allday-label {
  font-size: 0.82rem !important;
  color: var(--text) !important;
  cursor: pointer;
  display: flex !important;
  align-items: center;
  gap: 5px;
  margin-top: 4px;
  user-select: none;
}

.allday-label input[type="checkbox"] {
  accent-color: var(--primary);
  width: 14px;
  height: 14px;
  cursor: pointer;
}

.form-actions {
  display: flex;
  gap: 8px;
  margin-top: 0.6rem;
}

.btn-cancel, .btn-save {
  flex: 1;
  border: none;
  border-radius: 8px;
  padding: 0.45rem 0;
  font-size: 0.88rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  font-family: inherit;
}

.btn-cancel {
  background: rgba(0,0,0,0.06);
  color: var(--text);
}
.btn-cancel:hover {
  background: rgba(0,0,0,0.12);
}

.btn-save {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: white;
  box-shadow: 0 3px 10px rgba(74,107,223,0.3);
}
.btn-save:hover {
  transform: translateY(-1px);
  box-shadow: 0 5px 14px rgba(74,107,223,0.4);
}

.add-event-btn-wrap {
  margin-top: 1rem;
  text-align: center;
}

.add-event-btn {
  background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
  color: white;
  border: none;
  padding: 0.55rem 1.4rem;
  border-radius: 50px;
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: 600;
  font-family: inherit;
  transition: all 0.25s ease;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  box-shadow: 0 4px 14px rgba(74,107,223,0.3);
}

.add-event-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 7px 18px rgba(74,107,223,0.4);
}

.delete-btn {
  background: none;
  border: none;
  color: #b2bec3;
  cursor: pointer;
  font-size: 0.85rem;
  padding: 4px 6px;
  border-radius: 6px;
  transition: all 0.2s;
  flex-shrink: 0;
}

.delete-btn:hover {
  color: #e17055;
  background: rgba(225,112,85,0.1);
}
  </style>
</head>
<body>
  <div class="container">
    <div class="calendar-container">
      <div class="calendar-header">
        <div class="nav-buttons">
          <button class="nav-btn" id="prev-month"><i class="fas fa-chevron-left"></i></button>
          <button class="nav-btn" id="next-month"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="month-year" id="month-year">September 2025</div>
      </div>

      <div class="weekdays">
        <div class="weekday">Sun</div>
        <div class="weekday">Mon</div>
        <div class="weekday">Tue</div>
        <div class="weekday">Wed</div>
        <div class="weekday">Thu</div>
        <div class="weekday">Fri</div>
        <div class="weekday">Sat</div>
      </div>

      <div class="days" id="days"></div>

      <div class="calendar-footer">
        <button class="today-btn" id="today-btn"><i class="fas fa-calendar-day"></i> Today</button>
        <div class="event-indicator">
          <i class="fas fa-circle" style="color: var(--accent); font-size: 0.6rem;"></i>
          <span>Has events</span>
        </div>
      </div>
    </div>

    <div class="event-panel" id="event-panel">
      <div class="event-header">
        <div class="event-date" id="event-date">Select a date</div>
        <i class="fas fa-calendar-alt event-icon"></i>
      </div>

      <div class="add-event-form" id="add-event-form" style="display:none;">
        <div class="form-title"><i class="fas fa-plus-circle"></i> Add New Event</div>
        <div class="form-group">
          <label for="event-time-input"><i class="fas fa-clock"></i> Time</label>
          <input type="time" id="event-time-input" placeholder="e.g. 10:00">
          <label class="allday-label">
            <input type="checkbox" id="allday-check"> All day
          </label>
        </div>
        <div class="form-group">
          <label for="event-text-input"><i class="fas fa-pen"></i> Event Name</label>
          <input type="text" id="event-text-input" placeholder="e.g. Team Meeting" maxlength="60">
        </div>
        <div class="form-actions">
          <button class="btn-cancel" id="cancel-add"><i class="fas fa-times"></i> Cancel</button>
          <button class="btn-save" id="save-event"><i class="fas fa-check"></i> Save</button>
        </div>
      </div>

      <div class="event-list" id="event-list">
        <div class="no-events">Select a date to view or add events</div>
      </div>

      <div class="add-event-btn-wrap" id="add-event-btn-wrap" style="display:none;">
        <button class="add-event-btn" id="add-event-btn">
          <i class="fas fa-plus"></i> Add Event
        </button>
      </div>
    </div>
  </div>

  <script>
document.addEventListener('DOMContentLoaded', function () {
  const monthYearEl = document.getElementById('month-year');
  const daysEl = document.getElementById('days');
  const prevMonthBtn = document.getElementById('prev-month');
  const nextMonthBtn = document.getElementById('next-month');
  const todayBtn = document.getElementById('today-btn');
  const eventDateEl = document.getElementById('event-date');
  const eventListEl = document.getElementById('event-list');
  const addEventBtnWrap = document.getElementById('add-event-btn-wrap');
  const addEventBtn = document.getElementById('add-event-btn');
  const addEventForm = document.getElementById('add-event-form');
  const saveEventBtn = document.getElementById('save-event');
  const cancelAddBtn = document.getElementById('cancel-add');
  const eventTimeInput = document.getElementById('event-time-input');
  const eventTextInput = document.getElementById('event-text-input');
  const alldayCheck = document.getElementById('allday-check');

  let currentDate = new Date();
  let selectedDate = null;
  let selectedDateStr = null;

  function loadEvents() {
    const stored = localStorage.getItem('calendarEvents');
    if (stored) return JSON.parse(stored);
    return {};
  }

  function saveEvents() {
    localStorage.setItem('calendarEvents', JSON.stringify(events));
  }

  let events = loadEvents();

  function formatTime(timeStr) {
    if (!timeStr) return '';
    const [h, m] = timeStr.split(':').map(Number);
    const period = h >= 12 ? 'PM' : 'AM';
    const hour = h % 12 || 12;
    return `${hour}:${m.toString().padStart(2, '0')} ${period}`;
  }

  function renderCalendar() {
    const firstDay = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
    const lastDay = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0);
    const prevLastDay = new Date(currentDate.getFullYear(), currentDate.getMonth(), 0);
    const firstDayIndex = firstDay.getDay();
    const lastDayIndex = lastDay.getDay();
    const nextDays = 7 - lastDayIndex - 1;

    const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    monthYearEl.innerHTML = `${months[currentDate.getMonth()]} ${currentDate.getFullYear()}`;

    let days = '';

    for (let x = firstDayIndex; x > 0; x--) {
      const prevDate = prevLastDay.getDate() - x + 1;
      days += `<div class="day other-month">${prevDate}</div>`;
    }

    for (let i = 1; i <= lastDay.getDate(); i++) {
      const date = new Date(currentDate.getFullYear(), currentDate.getMonth(), i);
      const dateKey = `${currentDate.getFullYear()}-${currentDate.getMonth() + 1}-${i}`;
      const hasEvent = !!events[dateKey]?.length;

      let dayClass = 'day';
      const today = new Date();
      if (date.getDate() === today.getDate() && date.getMonth() === today.getMonth() && date.getFullYear() === today.getFullYear()) {
        dayClass += ' today';
      }
      if (selectedDate &&
        date.getDate() === selectedDate.getDate() &&
        date.getMonth() === selectedDate.getMonth() &&
        date.getFullYear() === selectedDate.getFullYear()
      ) {
        dayClass += ' selected';
      }
      if (hasEvent) dayClass += ' has-events';

      days += `<div class="${dayClass}" data-date="${dateKey}">${i}</div>`;
    }

    for (let j = 1; j <= nextDays; j++) {
      days += `<div class="day other-month">${j}</div>`;
    }

    daysEl.innerHTML = days;

    document.querySelectorAll('.day:not(.other-month)').forEach(day => {
      day.addEventListener('click', () => {
        const dateStr = day.getAttribute('data-date');
        const [year, month, dayNum] = dateStr.split('-').map(Number);
        selectedDate = new Date(year, month - 1, dayNum);
        selectedDateStr = dateStr;
        hideForm();
        renderCalendar();
        showEvents(dateStr);
        addEventBtnWrap.style.display = 'block';
      });
    });
  }

  function showEvents(dateStr) {
    const [year, month, day] = dateStr.split('-').map(Number);
    const dateObj = new Date(year, month - 1, day);
    const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    const dayNames = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

    eventDateEl.textContent = `${dayNames[dateObj.getDay()]}, ${months[dateObj.getMonth()]} ${day}, ${year}`;
    eventListEl.innerHTML = '';

    const dayEvents = events[dateStr];
    if (dayEvents && dayEvents.length > 0) {
      dayEvents.forEach((event, idx) => {
        const eventItem = document.createElement('div');
        eventItem.className = 'event-item';
        eventItem.innerHTML = `
          <div class="event-color"></div>
          <div class="event-time">${event.time}</div>
          <div class="event-text">${event.text}</div>
          <button class="delete-btn" data-index="${idx}" title="Delete event">
            <i class="fas fa-trash-alt"></i>
          </button>
        `;
        eventListEl.appendChild(eventItem);
      });

      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.getAttribute('data-index'));
          events[dateStr].splice(idx, 1);
          if (events[dateStr].length === 0) delete events[dateStr];
          saveEvents();
          renderCalendar();
          showEvents(dateStr);
        });
      });
    } else {
      eventListEl.innerHTML = '<div class="no-events">No events scheduled for this day</div>';
    }
  }

  function showForm() {
    addEventForm.style.display = 'block';
    addEventBtnWrap.style.display = 'none';
    eventTextInput.value = '';
    eventTimeInput.value = '';
    alldayCheck.checked = false;
    eventTimeInput.disabled = false;
    eventTextInput.focus();
  }

  function hideForm() {
    addEventForm.style.display = 'none';
    if (selectedDateStr) addEventBtnWrap.style.display = 'block';
  }

  alldayCheck.addEventListener('change', () => {
    eventTimeInput.disabled = alldayCheck.checked;
    if (alldayCheck.checked) eventTimeInput.value = '';
  });

  addEventBtn.addEventListener('click', showForm);
  cancelAddBtn.addEventListener('click', hideForm);

  saveEventBtn.addEventListener('click', () => {
    const text = eventTextInput.value.trim();
    if (!text) {
      eventTextInput.classList.add('input-error');
      eventTextInput.placeholder = 'Please enter an event name!';
      setTimeout(() => eventTextInput.classList.remove('input-error'), 1500);
      return;
    }

    const isAllDay = alldayCheck.checked;
    const timeRaw = eventTimeInput.value;
    const timeDisplay = isAllDay ? 'All day' : (timeRaw ? formatTime(timeRaw) : 'No time set');

    if (!events[selectedDateStr]) events[selectedDateStr] = [];
    events[selectedDateStr].push({ time: timeDisplay, text });

    events[selectedDateStr].sort((a, b) => {
      if (a.time === 'All day') return -1;
      if (b.time === 'All day') return 1;
      return a.time.localeCompare(b.time);
    });

    saveEvents();
    hideForm();
    renderCalendar();
    showEvents(selectedDateStr);
  });

  eventTextInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') saveEventBtn.click();
  });

  prevMonthBtn.addEventListener('click', () => {
    currentDate.setMonth(currentDate.getMonth() - 1);
    selectedDate = null;
    selectedDateStr = null;
    hideForm();
    addEventBtnWrap.style.display = 'none';
    renderCalendar();
    eventDateEl.textContent = 'Select a date';
    eventListEl.innerHTML = '<div class="no-events">Select a date to view or add events</div>';
  });

  nextMonthBtn.addEventListener('click', () => {
    currentDate.setMonth(currentDate.getMonth() + 1);
    selectedDate = null;
    selectedDateStr = null;
    hideForm();
    addEventBtnWrap.style.display = 'none';
    renderCalendar();
    eventDateEl.textContent = 'Select a date';
    eventListEl.innerHTML = '<div class="no-events">Select a date to view or add events</div>';
  });

  todayBtn.addEventListener('click', () => {
    currentDate = new Date();
    selectedDate = new Date();
    const d = selectedDate;
    selectedDateStr = `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
    hideForm();
    renderCalendar();
    showEvents(selectedDateStr);
    addEventBtnWrap.style.display = 'block';
  });

  renderCalendar();
});
  </script>
</body>
</html>
