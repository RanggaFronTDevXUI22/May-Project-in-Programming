<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive-Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card__container">
            <article class="card__article">
                <img src="Tokyo #1.jpg" alt="image" class="card_img">

                <div class="card__data">
                    <span class="card__description">Tokyo City,Japan</span>
                    <h2 class="card__title">City of biggest Entrepeuner Anime</h2>
                    <a href="#" class="card__button">Read More</a>
                </div>
            </article>

            <article class="card__article">
                <img src="Seoul #2.jpg" alt="image" class="card_img">

                <div class="card__data">
                    <span class="card__description">Seoul, South Korea</span>
                    <h2 class="card__title">Special Metropolitan City</h2>
                    <a href="#" class="card__button">Read More</a>
                </div>
            </article>
            <article class="card__article">
                <img src="shanghai #3.jpg" alt="image" class="card_img">

                <div class="card__data">
                    <span class="card__description">Shanghai, Chinese</span>
                    <h2 class="card__title">Future is the world</h2>
                    <a href="#" class="card__button">Read More</a>
                </div>
            </article>
        </div>
    </div>
    
</body>
</html>
