<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/7d998d0a35.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="hero">
    <div class="buttons">
        <button onclick="showToast(successMsg)">Succes</button>
        <button onclick="showToast(errorMsg)">Error</button>
        <button onclick="showToast(invalidMsg)">Invalid</button>
    </div>
    <div id="toastBox">

    </div>
</div>

    <script>

        let toastBox = document.getElementById('toastBox');
        let successMsg = '<i class="fa-solid fa-check"></i> Successfully submited';
        let errorMsg = '<i class="fa-solid fa-xmark"></i> Please fix the error!';
        let invalidMsg = '<i class="fa-solid fa-file-circle-xmark"></i> Invalid input, check again';


        function showToast(msg){
            let toast = document.createElement('div');
            toast.classList.add('toast');
            toast.innerHTML = msg;
            toastBox.appendChild(toast);

            if(msg.includes('error')){
                toast.classList.add('error');
            }
            
            if(msg.includes('invalid')){
                toast.classList.add('invalid');
            }
            
            setTimeout(()=> {
                toast.remove();
            },6000);
        }
    </script>

</body>
</html>
